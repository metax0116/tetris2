<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario 64 - 3D Action Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 8px;
        }

        .stat {
            margin: 8px 0;
        }

        .stat-label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-value {
            color: #fff;
            font-weight: bold;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 15px;
            border-radius: 8px;
            max-width: 300px;
        }

        .control-item {
            margin: 4px 0;
        }

        .camera-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 15px;
            border-radius: 8px;
        }

        .jump-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            display: none;
        }

        .jump-indicator.show {
            display: block;
            animation: bounce 0.3s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0;
            }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ff4757;
        }

        .game-over button {
            background: #ffd700;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .game-over button:hover {
            background: #ffed4e;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <div class="hud">
        <div class="stat">
            <span class="stat-label">🪙 Coins:</span>
            <span class="stat-value" id="coinCount">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">⭐ Stars:</span>
            <span class="stat-value" id="starCount">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">❤️ Health:</span>
            <span class="stat-value" id="healthCount">3</span>
        </div>
        <div class="stat">
            <span class="stat-label">Jumps Left:</span>
            <span class="stat-value" id="jumpsLeft">3</span>
        </div>
    </div>

    <div class="camera-info" id="cameraInfo">
        Mouse: Move Camera<br>
        C: Center Camera
    </div>

    <div class="controls">
        <div class="control-item">🎮 WASD - Move</div>
        <div class="control-item">SPACE - Jump (x3)</div>
        <div class="control-item">SHIFT - Sprint</div>
        <div class="control-item">Mouse - Camera Control</div>
        <div class="control-item">C - Reset Camera</div>
    </div>

    <div class="jump-indicator" id="jumpIndicator">
        ⭐ DOUBLE JUMP!
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER!</h2>
        <p id="gameOverStats"></p>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
